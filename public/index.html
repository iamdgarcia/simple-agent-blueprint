<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Agent Blueprint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Simple Agent Blueprint</h1>
            <p>Based on Agentic AI for Beginners Course - Modules 1.1-1.2</p>
        </header>
        
        <main>
            <div id="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <!-- Messages will be added here by JavaScript -->
                </div>
                
                <div id="chat-input-container">
                    <input 
                        type="text" 
                        id="user-input" 
                        placeholder="Ask me anything... (e.g., 'What is the weather in Paris?', 'Calculate 25 * 4', 'Search for latest AI news')"
                        autocomplete="off"
                    >
                    <button id="send-button">Send</button>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Deployed via Netlify using your affiliate link | <a href="https://iamdgarcia.substack.com" target="_blank">The Learning Curve</a></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
